<svg xmlns="http://www.w3.org/2000/svg" width="1340" height="760" viewBox="0 0 1340 760" role="img" aria-labelledby="title desc">
  <title id="title">Personal Assistant Runtime Architecture</title>
  <desc id="desc">L2 deterministic personal assistant workflow with Telegram and WhatsApp channels, channel gateway, AgentRuntimePort, MCP and tool adapters, persistence, workers, and hexagonal boundaries.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#db2777"/>
    </marker>
    <style>
      .title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 14px Arial, sans-serif; }
      .boxText { font: 13px Arial, sans-serif; fill: #0f172a; }
      .small { font: 12px Arial, sans-serif; fill: #334155; }
      .box { rx: 8; ry: 8; stroke-width: 2; }
      .dash { stroke-dasharray: 8 6; }
      .edge { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .edgeDash { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .edgeBlue { fill: none; stroke: #0284c7; stroke-width: 2; marker-end: url(#arrow-blue); }
      .edgeOrange { fill: none; stroke: #ea580c; stroke-width: 2; marker-end: url(#arrow-orange); }
      .edgeOrangeDash { fill: none; stroke: #ea580c; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow-orange); }
      .edgePink { fill: none; stroke: #db2777; stroke-width: 2; marker-end: url(#arrow-pink); }
      .edgeGray { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1340" height="760" fill="#ffffff"/>
  <text x="670" y="42" text-anchor="middle" class="title">Personal Assistant Runtime Architecture - L2 deterministic workflow inside hexagonal boundaries</text>

  <rect x="30" y="70" width="240" height="520" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="150" y="101" text-anchor="middle" class="label" fill="#1d4ed8">Inbound adapters</text>

  <rect x="65" y="120" width="170" height="52" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="150" y="142" text-anchor="middle" class="boxText"><tspan x="150">Telegram</tspan><tspan x="150" dy="17">webhook</tspan></text>
  <rect x="65" y="190" width="170" height="52" class="box dash" fill="#f8fafc" stroke="#2563eb"/>
  <text x="150" y="212" text-anchor="middle" class="boxText"><tspan x="150">WhatsApp</tspan><tspan x="150" dy="17">prepared / inactive</tspan></text>
  <rect x="65" y="285" width="170" height="58" class="box" fill="#bfdbfe" stroke="#1d4ed8"/>
  <text x="150" y="309" text-anchor="middle" class="boxText"><tspan x="150">Channel Gateway</tspan><tspan x="150" dy="17">auth + webhook guard</tspan></text>
  <rect x="65" y="365" width="170" height="58" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="150" y="389" text-anchor="middle" class="boxText"><tspan x="150">Message Normalizer</tspan><tspan x="150" dy="17">NormalizedMessage DTO</tspan></text>
  <rect x="65" y="445" width="170" height="60" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="150" y="469" text-anchor="middle" class="boxText"><tspan x="150">Principal authority</tspan><tspan x="150" dy="17">tenant_id from auth only</tspan></text>

  <polygon points="455,80 765,80 920,302.5 765,525 455,525 300,302.5" fill="#ffffff" stroke="#475569" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="610" y="118" text-anchor="middle" class="label" fill="#334155">Hexagonal core boundary: application use cases depend on ports and domain</text>

  <rect x="430" y="150" width="340" height="70" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="600" y="178" text-anchor="middle" class="boxText" font-weight="700"><tspan x="600">L2 deterministic workflow</tspan><tspan x="600" dy="17">route, validate, bounded LLM step, verify</tspan></text>
  <rect x="430" y="250" width="150" height="68" class="box" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="505" y="278" text-anchor="middle" class="boxText"><tspan x="505">Command Router</tspan><tspan x="505" dy="17">intent catalog + guardrails</tspan></text>
  <rect x="620" y="250" width="150" height="68" class="box" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="695" y="278" text-anchor="middle" class="boxText"><tspan x="695">Use cases</tspan><tspan x="695" dy="17">reminders, documents, memory</tspan></text>
  <polygon points="552.5,350 657.5,350 710,409 657.5,468 552.5,468 500,409" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="605" y="396" text-anchor="middle" class="boxText"><tspan x="605">Domain core</tspan><tspan x="605" dy="17">Principal, permissions,</tspan><tspan x="605" dy="17">reminders, memory models</tspan></text>
  <rect x="790" y="180" width="135" height="70" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="857.5" y="207" text-anchor="middle" class="boxText"><tspan x="857.5">AgentRuntimePort</tspan><tspan x="857.5" dy="17">bounded task + trace</tspan><tspan x="857.5" dy="17">+ approvals</tspan></text>
  <rect x="790" y="280" width="135" height="62" class="box" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="857.5" y="304" text-anchor="middle" class="boxText"><tspan x="857.5">ToolPort / LLMProvider</tspan><tspan x="857.5" dy="17">active allowlist</tspan></text>
  <rect x="395" y="485" width="390" height="56" class="box" fill="#f1f5f9" stroke="#64748b"/>
  <text x="590" y="508" text-anchor="middle" class="small"><tspan x="590">State ports: EventStorePort, OutboxPort, MemoryPort,</tspan><tspan x="590" dy="16">WorkflowStateStorePort, TraceRecorderPort</tspan></text>

  <rect x="960" y="70" width="330" height="300" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="1125" y="101" text-anchor="middle" class="label" fill="#c2410c">Outbound adapters / contracts</text>
  <rect x="1010" y="125" width="220" height="58" class="box" fill="#ffedd5" stroke="#ea580c"/>
  <text x="1120" y="149" text-anchor="middle" class="boxText"><tspan x="1120">LLM adapters</tspan><tspan x="1120" dy="17">MiniMax + Anthropic-compatible</tspan></text>
  <rect x="1010" y="210" width="220" height="72" class="box dash" fill="#ffffff" stroke="#ea580c"/>
  <text x="1120" y="238" text-anchor="middle" class="boxText"><tspan x="1120">Tool ports / MCP adapters</tspan><tspan x="1120" dy="17">MCP prepared;</tspan><tspan x="1120" dy="17">disabled in MVP path</tspan></text>
  <rect x="1010" y="310" width="220" height="58" class="box" fill="#ffedd5" stroke="#ea580c"/>
  <text x="1120" y="334" text-anchor="middle" class="boxText"><tspan x="1120">Concrete tools</tspan><tspan x="1120" dy="17">Calendar + notifications</tspan></text>

  <rect x="300" y="565" width="630" height="165" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="615" y="594" text-anchor="middle" class="label" fill="#475569">Persistence adapters: in-memory locally or Postgres backend</text>
  <path d="M335,640 C335,620 470,620 470,640 L470,682 C470,702 335,702 335,682 Z" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <path d="M335,640 C335,660 470,660 470,640" fill="none" stroke="#475569" stroke-width="2"/>
  <text x="402.5" y="660" text-anchor="middle" class="boxText"><tspan x="402.5">Postgres adapter</tspan><tspan x="402.5" dy="17">transaction boundary</tspan></text>
  <rect x="495" y="610" width="120" height="48" class="box" fill="#ffffff" stroke="#64748b"/>
  <text x="555" y="630" text-anchor="middle" class="small"><tspan x="555">Event Store</tspan><tspan x="555" dy="15">CloudEvents</tspan></text>
  <rect x="495" y="672" width="120" height="48" class="box" fill="#ffffff" stroke="#64748b"/>
  <text x="555" y="692" text-anchor="middle" class="small"><tspan x="555">Outbox</tspan><tspan x="555" dy="15">idempotent dispatch</tspan></text>
  <rect x="635" y="610" width="120" height="48" class="box" fill="#ffffff" stroke="#64748b"/>
  <text x="695" y="630" text-anchor="middle" class="small"><tspan x="695">Memory</tspan><tspan x="695" dy="15">tenant scoped</tspan></text>
  <rect x="635" y="672" width="120" height="48" class="box" fill="#ffffff" stroke="#64748b"/>
  <text x="695" y="692" text-anchor="middle" class="small"><tspan x="695">Audit / Trace</tspan><tspan x="695" dy="15">replay evidence</tspan></text>
  <rect x="775" y="640" width="120" height="54" class="box" fill="#ffffff" stroke="#64748b"/>
  <text x="835" y="662" text-anchor="middle" class="small"><tspan x="835">Workflow State</tspan><tspan x="835" dy="15">run status</tspan></text>

  <rect x="960" y="425" width="330" height="305" rx="8" fill="#fdf2f8" stroke="#db2777" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="1125" y="457" text-anchor="middle" class="label" fill="#be185d">Infrastructure workers</text>
  <rect x="1010" y="485" width="220" height="58" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="1120" y="509" text-anchor="middle" class="boxText"><tspan x="1120">ReminderWorker</tspan><tspan x="1120" dy="17">claims due reminders</tspan></text>
  <rect x="1010" y="570" width="220" height="58" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="1120" y="594" text-anchor="middle" class="boxText"><tspan x="1120">Outbox dispatcher</tspan><tspan x="1120" dy="17">publishes notifications</tspan></text>
  <rect x="1010" y="655" width="220" height="58" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="1120" y="679" text-anchor="middle" class="boxText"><tspan x="1120">Admin/API runtime</tspan><tspan x="1120" dy="17">audit + local operations</tspan></text>

  <path class="edge" d="M150 172 L150 285"/><text x="164" y="260" class="small">webhook</text>
  <path class="edgeDash" d="M235 216 L250 216 L250 314 L235 314"/><text x="252" y="268" class="small">prepared</text>
  <path class="edge" d="M150 343 L150 365"/>
  <path class="edge" d="M150 423 L150 445"/>
  <path class="edge" d="M235 475 L430 185"/><text x="255" y="350" class="small">normalized message + Principal</text>
  <path class="edge" d="M600 220 L505 250"/>
  <path class="edge" d="M580 284 L620 284"/><text x="588" y="275" class="small">route</text>
  <path class="edge" d="M695 318 L630 350"/><text x="695" y="345" class="small">domain rules</text>
  <path class="edgeBlue" d="M770 185 L790 215"/><text x="775" y="190" class="small">bounded run</text>
  <path class="edgeBlue" d="M857.5 250 L857.5 280"/><text x="866" y="270" class="small">ports</text>
  <path class="edgeOrange" d="M925 300 L1010 154"/><text x="944" y="202" class="small">adapter impls</text>
  <path class="edgeOrangeDash" d="M925 311 L1010 246"/><text x="948" y="262" class="small">future protocol</text>
  <path class="edgeOrange" d="M925 330 L1010 339"/><text x="938" y="354" class="small">side effects via approvals</text>
  <path class="edge" d="M695 318 L590 485"/><text x="605" y="470" class="small">state changes + events</text>
  <path class="edgeGray" d="M590 541 L402 625"/><text x="438" y="585" class="small">port implementations</text>
  <path class="edgeGray" d="M470 653 L495 634"/>
  <path class="edgeGray" d="M470 676 L495 696"/>
  <path class="edgeGray" d="M470 645 L635 634"/>
  <path class="edgeGray" d="M470 687 L635 696"/>
  <path class="edgeGray" d="M470 665 L775 667"/>
  <path class="edgePink" d="M895 667 L1010 514"/><text x="905" y="578" class="small">due work</text>
  <path class="edgePink" d="M615 696 L1010 599"/><text x="780" y="650" class="small">claim pending</text>
  <path class="edgePink" d="M1120 570 L1120 368"/><text x="1130" y="462" class="small">deliver</text>
  <path class="edgePink" d="M755 696 L1010 684"/><text x="858" y="711" class="small">audit views</text>
</svg>
